name: eShopOnWeb Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore eShopOnWeb.sln

      - name: Build
        run: dotnet build eShopOnWeb.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test eShopOnWeb.sln --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build   # ensures deploy runs only after build succeeds

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to West Europe WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: devops-webapp-westeurope-620322177   # replace with the name you generated
          slot-name: production
          package: .

      - name: Deploy to East US WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: devops-webapp-eastus-1562830604      # replace with the name you generated
          slot-name: production
          package: .
